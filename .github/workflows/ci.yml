name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: |
          node --check main.js
          node --check preload.js
          node --check gen-update-metadata.js
      - name: Validate electron-builder config
        run: npx electron-builder --help >/dev/null
