name: 🐛 Bug / Bogue
description: Report an app issue / Signaler un problème avec l'application
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: Description
      description: What happens? / Que se passe-t-il ?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Étapes pour reproduire
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: input
    id: version
    attributes:
      label: App version / Version de l'app
      placeholder: "e.g. 1.0.23"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version / Version de Windows
      placeholder: "e.g. Windows 11 23H2"
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / logs (optional)
      description: The log is at %AppData%/33 Immortals Overlay/update.log
